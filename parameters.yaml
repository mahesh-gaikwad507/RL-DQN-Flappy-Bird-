flappybirdv0:
  env_id: FlappyBird-v0
  epsilon_init: 1
  epsilon_min: 0.01  # Lowered so it explores even less when "trained"
  epsilon_decay: 0.996 # Slightly slower to give it more time to see pipes
  replay_memory_size: 100000
  mini_batch_size: 128 # Doubled for better stability
  network_sync_rate: 2000 # Keep the target network stable longer
  alpha: 0.0001 # Much lower learning rate for precision
  gamma: 0.99
  reward_threshold: 1000